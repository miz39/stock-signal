        entries.forEach((e,i) => {
          if (i) o += '<br>';
          o += '<b>' + $(e.name) + '</b> ' + Y(e.price) + '&times;' + (e.shares||0) + '株';
          o += '（RSI ' + (e.rsi != null ? e.rsi.toFixed(1) : '-') + '）';
          o += ' ストップ ' + Y(e.stop_loss);
        });
        const reasons = [...new Set(entries.map(e => e.reason).filter(Boolean))];
        if (reasons.length) o += '<div class="act-reason">' + reasons.map($).join(' / ') + '</div>';
        o += '</div></div>';
      }

      // Snapshot
      if (h.portfolio_snapshot) {
        const ps = h.portfolio_snapshot;
        const sv = ps.stock_value != null ? ps.stock_value : ps.total_value;
        o += '<div class="snapshot">';
        o += '保有 <b>' + (ps.open_count||0) + '銘柄</b>';
        o += ' / 株時価 <b>' + Y(sv) + '</b>';
        if (ps.cash != null) o += ' / 現金 <b>' + Y(ps.cash) + '</b>';
        if (ps.total_assets != null) o += ' / 総資産 <b>' + Y(ps.total_assets) + '</b>';
        o += '</div>';
      }

      // Buy candidates (top signals from scan)
      if (bsigs.length) {
        o += '<details class="candidates-wrap"><summary style="cursor:pointer;font-size:0.78rem;color:#64B5F6;margin-top:6px">買い候補 TOP' + Math.min(bsigs.length,5) + '</summary>';
        o += '<div class="candidates">';
        bsigs.slice(0,5).forEach(s => {
          const code = (s.ticker||'').replace('.T','');
          const sc = s.composite_score != null ? s.composite_score.toFixed(2) : '-';
          o += '<div class="cand-item"><b>' + $(s.name||code) + '</b>（' + code + '）' + Y(s.price) + ' RSI ' + (s.rsi != null ? s.rsi.toFixed(1) : '-') + ' Score ' + sc + TV(s.tv_score) + '</div>';
        });
        o += '</div></details>';
      }

      o += '</div></details>';
    });
    o += '</div></details>';
  });
  document.getElementById('root').innerHTML = o;
}
</script>
</body>
</html>
