<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>東京海上ホールディングス（8766）- Stock Detail</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#121212; color:#E0E0E0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; padding:16px; max-width:960px; margin:0 auto; }
a.back { color:#64B5F6; text-decoration:none; font-size:0.85rem; display:inline-block; margin-bottom:12px; }
a.back:hover { text-decoration:underline; }
.header { margin-bottom:16px; }
.header h1 { font-size:1.3rem; }
.header .code { color:#757575; font-size:0.85rem; }
.updated { font-size:0.75rem; color:#757575; margin-bottom:16px; }
.cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px; margin-bottom:20px; }
.card { background:#1E1E1E; border-radius:10px; padding:14px; text-align:center; }
.card .label { font-size:0.7rem; color:#9E9E9E; margin-bottom:4px; text-transform:uppercase; letter-spacing:0.5px; }
.card .value { font-size:1.4rem; font-weight:700; }
.card .sub, .card-sub { font-size:0.7rem; color:#757575; margin-top:2px; }
.section { margin-bottom:20px; }
.section h2 { font-size:1rem; margin-bottom:8px; padding-bottom:4px; border-bottom:1px solid #333; }
.chart-wrap { background:#1E1E1E; border-radius:10px; padding:12px; margin-bottom:20px; }
.green { color:#00C853; }
.red { color:#FF1744; }
@media(max-width:480px) {
  .cards { grid-template-columns:repeat(2,1fr); }
  .card .value { font-size:1.2rem; }
}
</style>
</head>
<body>
<a class="back" href="../index.html">&larr; ダッシュボードに戻る</a>
<div class="header">
  <h1>東京海上ホールディングス</h1>
  <span class="code">8766.T</span>
</div>
<div class="updated">最終更新: 2026-05-23 10:35 JST</div>

<div class="cards">
  <div class="card">
    <div class="label">現在価格</div>
    <div class="value" style="color:#9E9E9E">&yen;6,976</div>
    <div class="sub" style="color:#9E9E9E">+0.0%</div>
  </div>
  <div class="card">
    <div class="label">RSI(14)</div>
    <div class="value" style="color:#9E9E9E">-</div>
    <div class="sub"></div>
  </div>
  <div class="card">
    <div class="label">SMAクロス</div>
    <div class="value" style="color:#FF1744">-</div>
  </div>
  <div class="card">
    <div class="label">損切りライン</div>
    <div class="value" style="color:#FF1744">&yen;0</div>
    <div class="sub">取得価格の -5%</div>
  </div>
</div>

<div class="section">
  <h2>株価チャート（6ヶ月）</h2>
  <div class="chart-wrap">
    <canvas id="priceChart" height="300"></canvas>
  </div>
</div>

<div class="section">
  <h2>ファンダメンタル</h2>
  <div class="cards">
    <div class="card"><div class="label">データ</div><div class="value">-</div><div class="sub">取得できませんでした</div></div>
  </div>
</div>

<script>
const dates = [];
const prices = [];
const sma25 = [];
const sma75 = [];
const sma200 = [];
const entryPrice = 6976.0;
const entryDate = '2026-04-17';

if (dates.length > 0) {
  const ctx = document.getElementById('priceChart').getContext('2d');
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: dates,
      datasets: [
        {
          label: '終値',
          data: prices,
          borderColor: '#2196F3',
          backgroundColor: 'rgba(33,150,243,0.05)',
          fill: true,
          tension: 0.3,
          pointRadius: 0,
          pointHoverRadius: 4,
          borderWidth: 2,
          order: 1,
        },
        {
          label: 'SMA25',
          data: sma25,
          borderColor: '#FF9800',
          borderWidth: 1,
          borderDash: [4,2],
          pointRadius: 0,
          fill: false,
          order: 2,
        },
        {
          label: 'SMA75',
          data: sma75,
          borderColor: '#9C27B0',
          borderWidth: 1,
          borderDash: [4,2],
          pointRadius: 0,
          fill: false,
          order: 3,
        },
        {
          label: 'SMA200',
          data: sma200,
          borderColor: '#607D8B',
          borderWidth: 1,
          borderDash: [6,3],
          pointRadius: 0,
          fill: false,
          order: 4,
        },
        {
          label: '取得単価',
          data: dates.map(() => entryPrice),
          borderColor: '#F44336',
          borderWidth: 1,
          borderDash: [8,4],
          pointRadius: 0,
          fill: false,
          order: 5,
        },
        ...(entryDate && dates.includes(entryDate) ? [{
          label: '購入日',
          data: dates.map(d => d === entryDate ? entryPrice : null),
          borderColor: 'transparent',
          backgroundColor: '#F44336',
          pointRadius: 8,
          pointStyle: 'triangle',
          pointRotation: 0,
          showLine: false,
          order: 0,
        }] : []),
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color:'#9E9E9E', font:{ size:11 }, usePointStyle:true, pointStyle:'line' } },
        annotation: entryDate && dates.includes(entryDate) ? {
          annotations: {
            entryLine: {
              type: 'line',
              xMin: entryDate,
              xMax: entryDate,
              borderColor: 'rgba(244,67,54,0.4)',
              borderWidth: 1,
              borderDash: [4,3],
              label: {
                display: true,
                content: '購入 ' + entryDate,
                position: 'start',
                backgroundColor: 'rgba(244,67,54,0.8)',
                color: '#fff',
                font: { size: 10 },
                padding: 4,
              }
            }
          }
        } : {},
        tooltip: {
          callbacks: {
            label: function(ctx) {
              if (ctx.parsed.y == null) return null;
              return ctx.dataset.label + ': ¥' + ctx.parsed.y.toLocaleString();
            }
          }
        }
      },
      scales: {
        x: {
          ticks: { color:'#757575', maxTicksLimit:8, font:{ size:10 } },
          grid: { color:'#2A2A2A' }
        },
        y: {
          ticks: {
            color:'#757575',
            font:{ size:10 },
            callback: function(v) { return '¥' + v.toLocaleString(); }
          },
          grid: { color:'#2A2A2A' }
        }
      }
    }
  });
} else {
  document.getElementById('priceChart').parentElement.innerHTML =
    '<p style="text-align:center;color:#757575;padding:24px">チャートデータがありません</p>';
}
</script>
</body>
</html>
