name: Stock Signal

on:
  schedule:
    # JST 8:50 (UTC 23:50 前日) 月-金JST = 日-木UTC
    - cron: '50 23 * * 0-4'
    # JST 12:35 (UTC 3:35)
    - cron: '35 3 * * 1-5'
    # JST 15:10 (UTC 6:10)
    - cron: '10 6 * * 1-5'
  workflow_dispatch: # 手動実行用

jobs:
  signal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run signal
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_POLICY_WEBHOOK_URL: ${{ secrets.DISCORD_POLICY_WEBHOOK_URL }}
        run: python main.py

      - name: Commit state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trades.json my_portfolio.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Update trading state [skip ci]"
          git push || true
