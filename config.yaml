watchlist: "nikkei225"  # 日経225全銘柄を自動読み込み

account:
  balance: 300000
  risk_per_trade: 0.02
  max_allocation: 0.10  # 1銘柄あたり資産の10%まで
  max_positions: 10     # 上限10銘柄
  unit: 1

strategy:
  sma_short: 25
  sma_long: 75
  sma_trend: 200
  rsi_period: 14
  rsi_overbought: 70
  rsi_oversold: 30
  profit_tighten_pct: 0.03    # +3%でトレーリングストップ引き締め
  profit_tighten_trail: 0.04  # 引き締め後のトレーリング幅（-4%）
  profit_take_pct: 0.07       # +7%で半分利確
  profit_take_ratio: 0.5      # 利確時の売却比率（50%）

discord:
  # シークレットは環境変数から読み込み（systemd EnvironmentFile or export）
  # DISCORD_WEBHOOK_URL, DISCORD_BOT_TOKEN, DISCORD_POLICY_WEBHOOK_URL
  webhook_url: ""
  bot_token: ""
  policy_webhook_url: ""

mode: "paper"
