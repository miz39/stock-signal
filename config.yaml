watchlist: "nikkei225"  # 日経225全銘柄を自動読み込み

account:
  balance: 300000
  risk_per_trade: 0.02
  max_allocation: 0.10  # 1銘柄あたり資産の10%まで
  max_positions: 10     # 上限10銘柄
  unit: 1
  max_daily_entries: 3     # 1日あたりの新規エントリー上限
  max_sector_positions: 2  # 同一セクターの同時保有上限
  cooldown_days: 7         # 損切り後の再エントリー禁止日数

strategy:
  sma_short: 25
  sma_long: 75
  sma_trend: 200
  rsi_period: 14
  rsi_overbought: 70
  rsi_oversold: 30
  rsi_entry_min: 50        # 買いエントリー: RSI下限（上昇モメンタム確認）
  rsi_entry_max: 65        # 買いエントリー: RSI上限（過熱前）
  stop_loss_pct: 0.08            # 初期ストップロス（-8%）
  profit_tighten_pct: 0.06      # +6%でストップを建値に移動
  profit_take_pct: 0.08         # +8%で半分利確
  profit_take_ratio: 0.5        # 利確時の売却比率（50%）
  profit_take_full_pct: 0.15    # +15%で全部利確

discord:
  # シークレットは環境変数から読み込み（systemd EnvironmentFile or export）
  # DISCORD_WEBHOOK_URL, DISCORD_BOT_TOKEN, DISCORD_POLICY_WEBHOOK_URL
  webhook_url: ""
  bot_token: ""
  policy_webhook_url: ""

slack:
  # SLACK_WEBHOOK_URL 環境変数でも設定可能
  webhook_url: ""

profiles:
  conservative:
    strategy:
      stop_loss_pct: 0.12
      profit_tighten_pct: 0.08
      profit_take_pct: 0.10
      profit_take_full_pct: 0.20
  aggressive:
    strategy:
      stop_loss_pct: 0.05
      profit_tighten_pct: 0.03
      profit_take_pct: 0.06
      profit_take_full_pct: 0.10

mode: "paper"
