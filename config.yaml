watchlist: "nikkei225"  # 日経225全銘柄を自動読み込み

account:
  balance: 300000
  risk_per_trade: 0.02
  max_allocation: 0.10  # 1銘柄あたり資産の10%まで
  max_positions: 10     # 上限10銘柄
  unit: 1
  max_daily_entries: 3     # 1日あたりの新規エントリー上限
  max_sector_positions: 2  # 同一セクターの同時保有上限
  cooldown_days: 7         # 損切り後の再エントリー禁止日数
  max_consecutive_losses: 2  # N回連続損切りで当該銘柄エントリー禁止

strategy:
  sma_short: 25
  sma_long: 100
  sma_trend: 200
  rsi_period: 14
  rsi_overbought: 70
  rsi_oversold: 30
  rsi_entry_min: 50        # 買いエントリー: RSI下限（上昇モメンタム確認）
  rsi_entry_max: 65        # 買いエントリー: RSI上限（過熱前）
  stop_loss_pct: 0.08            # 初期ストップロス（-8%）
  profit_tighten_pct: 0.06      # +6%でストップを建値に移動
  profit_take_pct: 0.08         # +8%で半分利確
  profit_take_ratio: 0.5        # 利確時の売却比率（50%）
  profit_take_full_pct: 0.15    # +15%で全部利確
  min_volume: 500000             # 直近20日平均出来高が50万株以上
  market_regime_enabled: true     # 日経225 SMA50/SMA200で相場レジーム判定
  tv_recommendation_enabled: true  # TradingView TA推奨をスコアに組み込む
  # ADX Filter
  adx_period: 14
  adx_threshold: 25
  # Ichimoku (composite score only, not hard gate)
  ichimoku_tenkan: 9
  ichimoku_kijun: 26
  ichimoku_senkou_b: 52
  # CoCh Exit
  coch_exit_enabled: true
  coch_lookback: 3
  score_weights:                  # 複合スコアの重み（合計1.0）
    volume_surge: 0.20
    rsi_sweet_spot: 0.10
    sma_momentum: 0.25
    price_vs_sma200: 0.10
    tv_recommendation: 0.15
    ichimoku_bullish: 0.10
    trend_strength: 0.10
  slope_days: 5                    # SMA25傾き計算の日数（5日前との比較）
  slope_blend: 0.3                 # sma_momentum内の傾きブレンド率（0=乖離のみ, 1=傾きのみ）
  llm_review_enabled: true           # LLM review for BUY candidates (requires OPENAI_API_KEY)
  openai_model: "gpt-4o-mini"        # LLM model for review
  llm_max_review: 10                 # Max candidates to review per scan

risk:
  max_sector_pct: 0.30           # セクター集中度上限（金額ベース）
  max_portfolio_dd: 0.10         # ポートフォリオ最大DD閾値
  correlation_threshold: 0.70    # 銘柄間相関の警告閾値

discord:
  # シークレットは環境変数から読み込み（systemd EnvironmentFile or export）
  # DISCORD_WEBHOOK_URL, DISCORD_BOT_TOKEN, DISCORD_POLICY_WEBHOOK_URL
  webhook_url: ""
  bot_token: ""
  policy_webhook_url: ""

slack:
  # SLACK_WEBHOOK_URL 環境変数でも設定可能
  webhook_url: ""

profiles:
  conservative:
    strategy:
      stop_loss_pct: 0.12
      profit_tighten_pct: 0.08
      profit_take_pct: 0.10
      profit_take_full_pct: 0.20
  aggressive:
    strategy:
      stop_loss_pct: 0.05
      profit_tighten_pct: 0.03
      profit_take_pct: 0.06
      profit_take_full_pct: 0.10

mode: "paper"
